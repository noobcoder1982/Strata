<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strata — Atmospheric Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dark-mode"> 

    
    <button class="logout-btn" id="logout-btn" title="Logout & Calibrate">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18.36 6.64a9 9 0 1 1-12.73 0"></path>
            <line x1="12" y1="2" x2="12" y2="12"></line>
        </svg>
    </button>

    
    <div class="pull-cord-container">
        
        <svg id="theme-system-svg" width="100" height="1000" viewBox="0 0 100 1000" fill="none" xmlns="http://www.w3.org/2000/svg" style="overflow: visible; z-index: 9999;">
            
            <line class="bulb-wire" x1="50" y1="0" x2="50" y2="100" stroke-width="2"/>
            
            
            <g class="bulb-group" transform="translate(27, 100)">
                
                <rect class="bulb-socket" x="14" y="0" width="18" height="16" rx="2" stroke-width="1"/>
                <rect class="bulb-socket-rim" x="12" y="16" width="22" height="4"/>
                
                <path d="M15 20H31V23H15V20Z" fill="#1f1f1f"/>
                <path class="bulb-socket-thread" d="M16 23H30V26H16V23Z"/>
                <path d="M18 26H28V28H18V26Z" fill="#1f1f1f"/>
                
                
                <path class="bulb-filament" d="M19 28 L19 45 L22 55 L24 55 L27 45 L27 28" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <circle class="filament-tip" cx="23" cy="55" r="1.5"/>
                
                
                <path class="bulb-glass" d="M18 28 C 18 35 8 45 8 60 C 8 72 15 80 23 80 C 31 80 38 72 38 60 C 38 45 28 35 28 28 Z" stroke-width="2" stroke-linejoin="round"/>
                
                
                <defs>
                    <filter id="bulb-glow-filter" x="-50%" y="-50%" width="200%" height="200%">
                        <feGaussianBlur stdDeviation="6" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                </defs>
            </g>

            
            <path id="rope-path" class="chain-beads" d="M 50 180 L 50 360" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round" fill="none"/>
            
            <g id="rope-tassel" transform="translate(50, 360)" style="cursor: pointer; pointer-events: auto;">
                <rect class="chain-tassel" x="-3" y="0" width="6" height="24" rx="3" stroke-width="1"/>
                
                <g class="pull-indicator">
                    
                    <path d="M-22,12 L-10,12 M-14,8 L-10,12 L-14,16" stroke="var(--text-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
                    
                    <text x="-52" y="15" fill="var(--text-color)" font-family="'Space Grotesk', 'Neue Montreal', sans-serif" font-size="8.5" font-weight="700" letter-spacing="1.5" opacity="0.8">PULL</text>
                </g>
            </g>
        </svg>
    </div>

    
    <main class="dashboard-container bento-grid">
        
        
        <div class="bento-card main-status-card">
            <div class="header-block">
                <div class="location-wrapper">
                    <h1 class="location-title" id="location-name">Bhubaneswar, Odisha</h1>
                    <button class="change-location-btn" id="change-location-btn" title="Change Location">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a8 8 0 0 0-8 8c0 5.25 8 12 8 12s8-6.75 8-12a8 8 0 0 0-8-8z"></path>
                            <circle cx="12" cy="10" r="3"></circle>
                        </svg>
                        <span>Change</span>
                    </button>
                    
                    <button id="mobile-theme-btn" class="mobile-theme-btn" title="Toggle Theme">
                        
                        <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                        
                        <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                        </svg>
                    </button>
                </div>
                <p class="current-date" id="current-date">Wednesday, 13 May</p>
                <p class="welcome-user-tag" id="user-welcome-tag">Hello Guest</p>
            </div>

            
            <div class="temp-wrapper">
                <span class="temp-number" id="temp-display">36</span>
                <div class="temp-toggle-container">
                    <button class="temp-toggle-btn active" id="btn-cel" data-unit="C">°C</button>
                    <span class="temp-divider">/</span>
                    <button class="temp-toggle-btn" id="btn-fah" data-unit="F">°F</button>
                </div>
            </div>
        </div>

        
        <div class="bento-card sun-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <span class="bento-label">ASTRONOMICAL CYCLE</span>
            </div>
            <div class="sun-split-values">
                <div class="sun-metric">
                    <span class="sun-label">Sunrise</span>
                    <span class="sun-value" id="val-sunrise">06:30 a.m.</span>
                </div>
                <div class="sun-metric">
                    <span class="sun-label">Sunset</span>
                    <span class="sun-value" id="val-sunset">08:45 p.m.</span>
                </div>
            </div>
        </div>

        
        <div class="bento-card feels-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"></path>
                </svg>
                <span class="bento-label">FEELS LIKE</span>
            </div>
            <div class="bento-value-wrapper">
                <span class="bento-value" id="val-feels">40</span>
                <span class="bento-unit">°</span>
            </div>
        </div>

        
        <div class="bento-card uv-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
                </svg>
                <span class="bento-label">UV INDEX</span>
            </div>
            <span class="bento-value" id="val-uv">0 low</span>
        </div>

        
        <div class="bento-card wind-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path>
                </svg>
                <span class="bento-label">WIND VELOCITY</span>
            </div>
            <span class="bento-value" id="val-wind">05 km/h NE</span>
        </div>

        
        <div class="bento-card humidity-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <path d="M12 22a7 7 0 0 0 7-7c0-4.3-7-11-7-11S5 10.7 5 15a7 7 0 0 0 7 7z"></path>
                </svg>
                <span class="bento-label">HUMIDITY</span>
            </div>
            <span class="bento-value" id="val-humidity">90%</span>
        </div>

        
        <div class="bento-card pressure-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span class="bento-label">PRESSURE</span>
            </div>
            <span class="bento-value" id="val-pressure">1 004 hPa</span>
        </div>

        
        <div class="bento-card visibility-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <span class="bento-label">VISIBILITY</span>
            </div>
            <span class="bento-value" id="val-visibility">12 km</span>
        </div>

        
        <div class="bento-card forecast-timeline-card">
            <div class="bento-card-header">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <span class="bento-label">ATMOSPHERIC FORECAST (HOURLY TRACKER)</span>
            </div>
            
            <div class="forecast-row" id="forecast-row">
                
            </div>
        </div>

        
        <div class="bento-card mobile-daily-card">
            <div class="forecast-row mobile-daily-row" id="mobile-daily-row">
                
            </div>
        </div>
        
    </main>

    
    <div id="location-modal" class="location-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Change Location</h2>
                <button id="close-modal-btn" class="close-modal-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="search-wrapper">
                    <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="modal-search" class="modal-search-input" placeholder="Search cities (e.g. Mumbai, Tokyo, London)..." autocomplete="off">
                </div>
                <div class="modal-results" id="modal-results">
                    
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
